<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NODAテニススコアMP (詳細分析版)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* 背景色をご指定の #6c9bd2 に変更 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #6c9bd2; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        input, select { user-select: auto; -webkit-user-select: auto; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase 初期化 (キー部分は仮置き)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyALm25ves0Xi-hm1mKdOlt9oxx58YvKCo4",
            authDomain: "tennis-scoremp.firebaseapp.com",
            projectId: "tennis-scoremp",
            storageBucket: "tennis-scoremp.firebasestorage.app",
            messagingSenderId: "787908634164",
            appId: "1:787908634164:web:ec3d2419c4f91e4021cc61"
        };

        let db = null;
        if (typeof firebase !== 'undefined') {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                firebase.auth().signInAnonymously().catch(console.error);
            } catch (e) { console.error("Firebase init error:", e); }
        }

        const { useState, useEffect, useMemo, createElement } = React;

        const LucideIcon = ({ name, size = 24, className, ...props }) => {
            const iconData = window.lucide && window.lucide.icons ? window.lucide.icons[name] : null;
            if (!iconData) return <span style={{ width: size, height: size, display: 'inline-block' }}></span>;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                    {iconData.map(([tag, attrs], index) => createElement(tag, { ...attrs, key: index }))}
                </svg>
            );
        };

        const Trophy = (props) => <LucideIcon name="Trophy" {...props} />;
        const Activity = (props) => <LucideIcon name="Activity" {...props} />;
        const Save = (props) => <LucideIcon name="Save" {...props} />;
        const Keyboard = (props) => <LucideIcon name="Keyboard" {...props} />;
        const ListIcon = (props) => <LucideIcon name="List" {...props} />;
        const CornerDownRight = (props) => <LucideIcon name="CornerDownRight" {...props} />;

        const POINTS = ['0', '15', '30', '40', 'Ad', 'GAME']; 
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbzGVV5XjhmbJBialJy5f--xm0VVuDBGahgtf1ZPW5rX_V1kPafKPBL1WRnz8i42y4gS/exec"; 

        // 分析用の選択肢マスタ
        const FORMATIONS = ['雁行陣', '並行陣', '2バック', 'アイフォーメーション', 'オーストラリアン'];
        const SERVE_PLACEMENTS = ['センター', 'ボディ', 'ワイド'];
        const RETURN_PLACEMENTS = ['ストレート', 'ストレートロブ', 'クロス', 'クロスロブ', '真ん中'];
        const THIRD_SHOTS = ['後衛ストロークストレート', '後衛ストローククロス', '後衛ボレーストレート', '後衛ボレークロス', '前衛ボレーストレート', '前衛ボレークロス', '前衛ボレーポーチ', '前衛ボレースマッシュ'];

        const DEFAULT_PLAYER_LIST = {
            "神戸野田 男": ["川口 暖斗", "河野 晃太", "菊川 雄介", "玉田 一将", "舩岡 恵大", "小林 純平", "高橋 史生", "飯田 隼生", "小橋 悠人", "谷澤 拓真", "春田 陽向", "藤谷 柊司", "三木 望夢", "村山 蒼"],
            "神戸野田 女": ["黒木 凜", "石田 実莉", "五島 宇莉", "早見 芽衣", "山本 結貴", "石川 夕楓", "笠原 瑠那", "川中 一花", "谷口 楓"]
        };

        const DEFAULT_MATCH_INFO = {
            matchName: '試合名', isDoubles: true,
            playerA1: 'Player A1', playerA2: 'Player A2',
            playerB1: 'Player B1', playerB2: 'Player B2',
            matchType: '1set', setsToWin: 1, gamesToWinSet: 6, tiebreakAt: 6, noAd: false, 
            serverFirst: 'A', gasUrl: DEFAULT_GAS_URL
        };

        const Button = ({ onClick, children, className = "", variant = "primary", disabled = false, size = "md" }) => {
            const baseStyle = "font-bold rounded-lg shadow-sm transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center select-none cursor-pointer";
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800",
                secondary: "bg-white text-gray-700 border border-gray-300 hover:bg-gray-50",
                success: "bg-green-600 text-white hover:bg-green-700",
                danger: "bg-red-500 text-white hover:bg-red-600",
                warning: "bg-yellow-400 text-yellow-900 hover:bg-yellow-500",
                outline: "bg-transparent text-blue-600 border border-blue-600 hover:bg-blue-50"
            };
            const sizes = { sm: "px-2 py-1 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-lg" };
            return <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className}`} disabled={disabled}>{children}</button>;
        };

        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden ${className}`}>{children}</div>;

        const PlayerSelectInput = ({ label, value, onChange, playerList }) => {
            const [mode, setMode] = useState('list');
            const [team, setTeam] = useState('');
            const teams = useMemo(() => Object.keys(playerList || {}), [playerList]);
            useEffect(() => { if (mode === 'list' && teams.length > 0 && !team) setTeam(teams[0]); }, [mode, teams, team]);
            return (
                <div className="bg-slate-50 p-2 rounded-md border border-slate-200">
                    <div className="flex justify-between items-center mb-1">
                        <label className="text-sm font-bold text-gray-700">{label}</label>
                        <button onClick={() => setMode(mode === 'list' ? 'manual' : 'list')} className="text-[10px] flex items-center gap-1 text-blue-600">
                            {mode === 'list' ? <><Keyboard size={12}/> 手入力</> : <><ListIcon size={12}/> リスト</>}
                        </button>
                    </div>
                    {mode === 'list' && teams.length > 0 ? (
                        <div className="flex gap-2">
                            <select className="flex-1 p-1.5 border rounded text-sm bg-white" value={team} onChange={(e) => setTeam(e.target.value)}>{teams.map(t => <option key={t} value={t}>{t}</option>)}</select>
                            <select className="flex-[1.5] p-1.5 border rounded text-sm bg-white font-bold" value={value || ''} onChange={(e) => onChange(e.target.value)}><option value="">選択...</option>{playerList[team]?.map(p => <option key={p} value={p}>{p}</option>)}</select>
                        </div>
                    ) : (<input type="text" className="w-full p-1.5 border rounded text-sm bg-white" value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder="名前" />)}
                </div>
            );
        };

        // ==========================================
        // メインアプリケーション
        // ==========================================
        const App = () => {
            const [screen, setScreen] = useState('setup'); 
            const [matchInfo, setMatchInfo] = useState(DEFAULT_MATCH_INFO);
            const [history, setHistory] = useState([]); 
            const [playerList, setPlayerList] = useState({});
            const [currentServerPlayer, setCurrentServerPlayer] = useState('A1');
            
            // --- 陣形・詳細記録用のState群 ---
            const [serverFormation, setServerFormation] = useState(FORMATIONS[0]);
            const [receiverFormation, setReceiverFormation] = useState(FORMATIONS[0]);
            const [pointStep, setPointStep] = useState('SERVE'); 
            
            // 各ショットごとの陣形遷移も記録できるように拡張
            const initialPointData = { 
                servePlacement: null, returnPlacement: null, thirdShot: null,
                sForm1: null, rForm1: null, 
                sForm2: null, rForm2: null, 
                sForm3: null, rForm3: null, 
                sForm4: null, rForm4: null  
            };
            const [pointData, setPointData] = useState(initialPointData);
            
            // 各ステップの選択状態保持用
            const [selectedServePlacement, setSelectedServePlacement] = useState(null);
            const [selectedReturnPlacement, setSelectedReturnPlacement] = useState(null);
            const [selectedThirdShot, setSelectedThirdShot] = useState(null);

            useEffect(() => {
                const pData = localStorage.getItem('tennis_player_list');
                if (pData) { try { setPlayerList(JSON.parse(pData)); } catch(e) { setPlayerList(DEFAULT_PLAYER_LIST); } } 
                else { setPlayerList(DEFAULT_PLAYER_LIST); }
            }, []);

            // スコア・スタッツ計算 (元のロジック完全維持)
            const { currentScore, matchStats, timeline } = useMemo(() => {
                let state = { setsA: 0, setsB: 0, gamesA: 0, gamesB: 0, pointsA: 0, pointsB: 0, isTiebreak: false, winner: null, currentServerSide: matchInfo.serverFirst, gameServerSide: matchInfo.serverFirst, lastGameResult: null };
                const initStat = { totalPoints: 0, serves: 0, serves1st: 0, firstIn: 0, faults: 0, doubleFaults: 0, aces: 0 };
                let stats = { A1: { ...initStat }, A2: { ...initStat }, B1: { ...initStat }, B2: { ...initStat } };
                let statsPair = { A: { totalPoints: 0, serves: 0, serves1st: 0, firstIn: 0, faults: 0, doubleFaults: 0, aces: 0 }, B: { totalPoints: 0, serves: 0, serves1st: 0, firstIn: 0, faults: 0, doubleFaults: 0, aces: 0 } };
                let gameStats = [];
                let tempGameStats = { gameIndex: 1, serverPlayer: null, stats: { serves: 0, serves1st: 0, firstIn: 0, faults: 0, doubleFaults: 0 } };
                const calculatedTimeline = [];
                let isSecondServe = false;

                history.forEach((rawEvent) => {
                    const eventServerPlayer = rawEvent.serverPlayer;
                    const eventServerSide = eventServerPlayer ? eventServerPlayer.charAt(0) : state.currentServerSide;
                    if (eventServerPlayer && stats[eventServerPlayer]) {
                        const s = stats[eventServerPlayer]; const ts = tempGameStats.stats; const ps = statsPair[eventServerSide];
                        tempGameStats.serverPlayer = eventServerPlayer;
                        if (!isSecondServe) { s.serves1st++; ts.serves1st++; ps.serves1st++; }
                        if (rawEvent.type === 'FAULT') { s.serves++; s.faults++; ts.serves++; ts.faults++; ps.serves++; ps.faults++; } 
                        else if (rawEvent.type === 'DOUBLE_FAULT') { s.serves++; s.doubleFaults++; ts.serves++; ts.doubleFaults++; ps.serves++; ps.doubleFaults++; } 
                        else { s.serves++; ts.serves++; ps.serves++; if (!isSecondServe) { s.firstIn++; ts.firstIn++; ps.firstIn++; } if (rawEvent.type === 'ACE') { s.aces++; ps.aces++; } }
                    }
                    const timelineItem = { ...rawEvent, calculatedServerSide: eventServerSide, isSecondServe: isSecondServe, scoreSnapshot: { ...state } };
                    if (state.winner) { calculatedTimeline.push(timelineItem); return; }
                    if (rawEvent.type === 'FAULT') { isSecondServe = true; calculatedTimeline.push(timelineItem); return; }
                    isSecondServe = false;
                    let winnerSide = rawEvent.winner;
                    if (rawEvent.type === 'DOUBLE_FAULT') winnerSide = eventServerSide === 'A' ? 'B' : 'A'; 
                    if (winnerSide) statsPair[winnerSide].totalPoints++;

                    if (!state.winner) {
                        if (state.isTiebreak) {
                            if (winnerSide === 'A') state.pointsA++; else state.pointsB++;
                            if ((state.pointsA >= 7 || state.pointsB >= 7) && Math.abs(state.pointsA - state.pointsB) >= 2) {
                                state.gamesA += (state.pointsA > state.pointsB ? 1 : 0); state.gamesB += (state.pointsB > state.pointsA ? 1 : 0);
                                if (state.gamesA > state.gamesB) state.setsA++; else state.setsB++;
                                state.pointsA = 0; state.pointsB = 0; state.isTiebreak = false; state.gamesA = 0; state.gamesB = 0; 
                                if (state.setsA >= matchInfo.setsToWin) state.winner = 'A'; else if (state.setsB >= matchInfo.setsToWin) state.winner = 'B'; else state.gameServerSide = (state.gameServerSide === 'A' ? 'B' : 'A');
                            }
                        } else {
                            if (winnerSide === 'A') state.pointsA++; else state.pointsB++;
                            const hasAd = state.pointsA >= 3 && state.pointsB >= 3; let gameFinished = false;
                            if (hasAd) { if (state.pointsA > state.pointsB + 1) { state.gamesA++; gameFinished = true; } else if (state.pointsB > state.pointsA + 1) { state.gamesB++; gameFinished = true; } } 
                            else { if (state.pointsA > 3) { state.gamesA++; gameFinished = true; } else if (state.pointsB > 3) { state.gamesB++; gameFinished = true; } }

                            if (gameFinished) {
                                state.pointsA = 0; state.pointsB = 0; state.gameServerSide = (state.gameServerSide === 'A' ? 'B' : 'A'); 
                                let setFinished = false; const target = matchInfo.gamesToWinSet;
                                if (state.gamesA === matchInfo.tiebreakAt && state.gamesB === matchInfo.tiebreakAt) { state.isTiebreak = true; } 
                                else { if ((state.gamesA >= target && state.gamesA >= state.gamesB + 2) || (state.gamesA === target + 1 && state.gamesB === target - 1)) setFinished = true; else if ((state.gamesB >= target && state.gamesB >= state.gamesA + 2) || (state.gamesB === target + 1 && state.gamesA === target - 1)) setFinished = true; }
                                if (setFinished) { if (state.gamesA > state.gamesB) state.setsA++; else state.setsB++; if (state.setsA >= matchInfo.setsToWin) state.winner = 'A'; else if (state.setsB >= matchInfo.setsToWin) state.winner = 'B'; else { state.gamesA = 0; state.gamesB = 0; } }
                            }
                        }
                    }
                    if (!state.winner) { if (state.isTiebreak) { const totalPts = state.pointsA + state.pointsB; const seq = totalPts % 4; if (seq === 0 || seq === 3) state.currentServerSide = state.gameServerSide; else state.currentServerSide = (state.gameServerSide === 'A' ? 'B' : 'A'); } else { state.currentServerSide = state.gameServerSide; } } else { state.currentServerSide = null; }
                    calculatedTimeline.push(timelineItem);
                });
                return { currentScore: state, matchStats: { stats, statsPair, gameStats }, timeline: calculatedTimeline };
            }, [history, matchInfo]);

            useEffect(() => {
                if (!currentScore.currentServerSide) return;
                const side = currentScore.currentServerSide;
                if (side !== currentServerPlayer.charAt(0)) {
                    if (matchInfo.isDoubles) {
                        let lastServer = null;
                        for (let i = timeline.length - 1; i >= 0; i--) { if (timeline[i].calculatedServerSide === side) { lastServer = timeline[i].serverPlayer; break; } }
                        setCurrentServerPlayer(side + (lastServer && lastServer.endsWith('1') ? '2' : '1'));
                    } else setCurrentServerPlayer(side + '1');
                }
            }, [currentScore.currentServerSide, currentServerPlayer, matchInfo.isDoubles, timeline]);

            // --- ポイント記録（詳細データと各ステップの陣形保存） ---
            const finalizePoint = (type, winner, extraData = {}) => {
                if (currentScore.winner) return;
                setHistory(prev => [...prev, {
                    id: Date.now(), timestamp: new Date().toISOString(), type, winner, serverPlayer: currentServerPlayer,
                    serverFormation, receiverFormation, 
                    ...pointData, ...extraData
                }]);
                
                // 次のポイントに向けて全てリセット
                setPointStep('SERVE');
                setPointData(initialPointData);
                setSelectedServePlacement(null);
                setSelectedReturnPlacement(null);
                setSelectedThirdShot(null);
            };

            const isDeuce = !currentScore.isTiebreak && !matchInfo.noAd && currentScore.pointsA >= 3 && currentScore.pointsB >= 3 && currentScore.pointsA === currentScore.pointsB;
            const nextIsSecondServe = timeline.length > 0 && timeline[timeline.length - 1].type === 'FAULT';

            // CSVエクスポート処理 (ファイル名に【分析】を追加)
            const generateCSV = () => {
                let csv = "\uFEFF"; 
                csv += `Match Name,${matchInfo.matchName},,,,Date,${new Date().toLocaleDateString()}\n\n`;
                // ヘッダーに「Point」を追加
                csv += "No.,Game,Point,サーバー,サイド,Fault,内容,ポイント勝者,S陣形(1球目),R陣形(1球目),サーブ位置,S陣形(2球目),R陣形(2球目),リターン,S陣形(3球目),R陣形(3球目),3球目,S陣形(決着時),R陣形(決着時),ゲームカウント\n";
                
                let seq = 1;
                timeline.forEach((t) => {
                    const s = t.scoreSnapshot; // プレー開始前のスコア状態
                    const gameNum = s.gamesA + s.gamesB + 1;
                    
                    // スコア表示文字列の生成（15-0 など）
                    const pA = s.isTiebreak ? s.pointsA : (POINTS[s.pointsA] || s.pointsA);
                    const pB = s.isTiebreak ? s.pointsB : (POINTS[s.pointsB] || s.pointsB);
                    const pointStr = `${pA}-${pB}`;

                    let contentStr = t.type;
                    if (t.type === 'ACE') contentStr = "エース"; else if (t.type === 'DOUBLE_FAULT') contentStr = "ダブルフォルト"; else if (t.type === 'SERVER_P') contentStr = "サーバーポイント"; else if (t.type === 'RECEIVER_P') contentStr = "レシーバーポイント";
                    let winnerRole = t.type !== 'FAULT' ? (t.winner === t.calculatedServerSide ? "サーバー" : "レシーバー") : "";
                    const faultStr = t.type === 'FAULT' ? "Fault" : (t.isSecondServe ? "2nd" : "1st");
                    
                    const sf1 = t.sForm1 || t.serverFormation || "-";
                    const rf1 = t.rForm1 || t.receiverFormation || "-";
                    const serveP = t.servePlacement || "-";
                    
                    const sf2 = t.sForm2 || "-";
                    const rf2 = t.rForm2 || "-";
                    const retP = t.returnPlacement || "-";
                    
                    const sf3 = t.sForm3 || "-";
                    const rf3 = t.rForm3 || "-";
                    const thirdS = t.thirdShot || "-";

                    const sf4 = t.sForm4 || "-";
                    const rf4 = t.rForm4 || "-";

                    csv += `${seq},${gameNum},${pointStr},${t.serverPlayer},${s.isTiebreak ? "TB" : ((s.pointsA+s.pointsB)%2===0?"Deuce":"Ad")},${faultStr},${contentStr},${winnerRole},${sf1},${rf1},${serveP},${sf2},${rf2},${retP},${sf3},${rf3},${thirdS},${sf4},${rf4},${s.gamesA}-${s.gamesB}\n`;
                    seq++;
                });
                return csv;
            };
            
            // ファイル名に「【分析】」を追加
            const exportCSV = () => { 
                const link = document.createElement("a"); 
                link.setAttribute("href", "data:text/csv;charset=utf-8," + encodeURIComponent(generateCSV())); 
                link.setAttribute("download", `【分析】tennis_${Date.now()}.csv`); 
                document.body.appendChild(link); 
                link.click(); 
            };

            if (screen === 'setup') {
                return (
                    // 背景色指定を bg-[#6c9bd2] に変更
                    <div className="min-h-screen p-4 flex items-center justify-center max-w-md mx-auto bg-[#6c9bd2] select-none">
                        <Card className="w-full p-6">
                            <div className="flex items-center gap-2 mb-6 text-blue-800"><Trophy className="w-6 h-6" /><h1 className="text-2xl font-bold">ダブルス詳細分析</h1></div>
                            <div className="space-y-4">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">試合名</label><input type="text" className="w-full p-2 border rounded-md" value={matchInfo.matchName} onChange={(e) => setMatchInfo({...matchInfo, matchName: e.target.value})}/></div>
                                <div className="space-y-3">
                                    <div className="bg-blue-50 p-3 rounded"><div className="text-xs text-blue-700 font-bold mb-2">ペア A</div><PlayerSelectInput label="選手 A1" value={matchInfo.playerA1} onChange={(val) => setMatchInfo(prev => ({ ...prev, playerA1: val }))} playerList={playerList}/><div className="mt-2"><PlayerSelectInput label="選手 A2" value={matchInfo.playerA2} onChange={(val) => setMatchInfo(prev => ({ ...prev, playerA2: val }))} playerList={playerList}/></div></div>
                                    <div className="bg-red-50 p-3 rounded"><div className="text-xs text-red-700 font-bold mb-2">ペア B</div><PlayerSelectInput label="選手 B1" value={matchInfo.playerB1} onChange={(val) => setMatchInfo(prev => ({ ...prev, playerB1: val }))} playerList={playerList}/><div className="mt-2"><PlayerSelectInput label="選手 B2" value={matchInfo.playerB2} onChange={(val) => setMatchInfo(prev => ({ ...prev, playerB2: val }))} playerList={playerList}/></div></div>
                                </div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">最初のサーバー</label><div className="flex bg-gray-100 rounded-md p-1">{['A', 'B'].map(p => (<button key={p} onClick={() => setMatchInfo({...matchInfo, serverFirst: p})} className={`flex-1 py-1 text-sm rounded ${matchInfo.serverFirst === p ? 'bg-white shadow text-blue-600 font-bold' : 'text-gray-500'}`}>{p}</button>))}</div></div>
                                <Button className="w-full mt-6" size="lg" onClick={() => setScreen('match')}>試合開始</Button>
                            </div>
                        </Card>
                    </div>
                );
            }

            return (
                // メイン画面の背景色も bg-[#6c9bd2] に変更
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-[#6c9bd2] relative select-none">
                    {/* 上部スコアボード */}
                    <div className="bg-slate-900 text-white p-4 pb-6 rounded-b-3xl shadow-lg shrink-0">
                        <div className="flex justify-between items-center mb-2 opacity-80 text-sm"><span>{matchInfo.matchName}</span><Button variant="outline" size="sm" className="text-white border-white hover:bg-slate-800" onClick={exportCSV}><Save size={16} className="mr-1"/>CSV</Button></div>
                        <div className="flex justify-between items-center text-center">
                            <div className={`flex-1 ${currentScore.currentServerSide === 'A' ? 'text-yellow-300 font-bold' : ''}`}><div className="text-xs text-slate-400">Pair A</div><div>{matchInfo.playerA1}</div><div className="text-sm">{matchInfo.playerA2}</div></div>
                            <div className="flex flex-col items-center mx-2 bg-slate-800 px-3 py-1 rounded-lg"><div className="flex gap-4 text-xl font-mono font-bold"><span>{currentScore.setsA}</span><span className="text-slate-500">-</span><span>{currentScore.setsB}</span></div><div className="flex gap-4 text-lg font-mono text-blue-300 mt-1"><span>{currentScore.gamesA}</span><span className="text-slate-600">-</span><span>{currentScore.gamesB}</span></div></div>
                            <div className={`flex-1 ${currentScore.currentServerSide === 'B' ? 'text-yellow-300 font-bold' : ''}`}><div className="text-xs text-slate-400">Pair B</div><div>{matchInfo.playerB1}</div><div className="text-sm">{matchInfo.playerB2}</div></div>
                        </div>
                        <div className="mt-4 flex justify-center items-center gap-6 text-4xl font-mono font-bold">
                            <div className={POINTS[currentScore.pointsA] === 'Ad' ? 'text-yellow-400' : ''}>{POINTS[currentScore.pointsA] || currentScore.pointsA}</div>
                            <div className="text-slate-600">:</div>
                            <div className={POINTS[currentScore.pointsB] === 'Ad' ? 'text-yellow-400' : ''}>{POINTS[currentScore.pointsB] || currentScore.pointsB}</div>
                        </div>
                    </div>

                    {!currentScore.winner && (
                        // ウィザード部分の外枠を透明にして背景色を透過
                        <div className="flex-1 flex flex-col h-full overflow-hidden bg-transparent">
                            {/* 陣形セレクタ */}
                            <div className="bg-white p-2 border-b flex gap-2 shadow-sm shrink-0 z-10">
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-gray-500 block mb-0.5">サーバー陣形</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-sm p-1.5 rounded" value={serverFormation} onChange={e => setServerFormation(e.target.value)}>
                                        {FORMATIONS.map(f => <option key={f} value={f}>{f}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-gray-500 block mb-0.5">レシーバー陣形</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-sm p-1.5 rounded" value={receiverFormation} onChange={e => setReceiverFormation(e.target.value)}>
                                        {FORMATIONS.map(f => <option key={f} value={f}>{f}</option>)}
                                    </select>
                                </div>
                            </div>

                            {/* ウィザード表示領域（操作しやすいように白背景のカード風に調整） */}
                            <div className="flex-1 p-3 overflow-y-auto pb-8 flex flex-col gap-3 bg-white/95 rounded-t-xl mt-2 mx-2 mb-2 shadow-md">
                                
                                {/* Step 1: SERVE */}
                                {pointStep === 'SERVE' && (
                                    <div className="animate-in fade-in slide-in-from-bottom-2 duration-200">
                                        <div className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                            <span className="bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">1</span>
                                            サーブ位置を選択 ({nextIsSecondServe ? '2nd' : '1st'})
                                        </div>
                                        
                                        <div className="grid grid-cols-3 gap-2 mb-3">
                                            {SERVE_PLACEMENTS.map(pos => (
                                                <button key={pos} onClick={() => setSelectedServePlacement(pos)} className={`p-3 text-sm rounded border transition-colors ${selectedServePlacement === pos ? 'bg-blue-600 text-white border-blue-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'}`}>
                                                    {pos}
                                                </button>
                                            ))}
                                        </div>

                                        <div className={`transition-all overflow-hidden ${selectedServePlacement ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <div className="text-xs text-blue-800 font-bold mb-2 text-center">このサーブの結果は？</div>
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    <Button variant="warning" className="h-12 text-xs" disabled={nextIsSecondServe} onClick={() => finalizePoint('FAULT', currentScore.currentServerSide === 'A' ? 'B' : 'A', { servePlacement: selectedServePlacement, sForm1: serverFormation, rForm1: receiverFormation })}>フォルト</Button>
                                                    {/* ダブルフォルトはレシーバー得点なので赤(danger) */}
                                                    <Button variant="danger" className="h-12 text-xs" disabled={!nextIsSecondServe} onClick={() => finalizePoint('DOUBLE_FAULT', currentScore.currentServerSide === 'A' ? 'B' : 'A', { servePlacement: selectedServePlacement, sForm1: serverFormation, rForm1: receiverFormation })}>ダブルフォルト<br/>(レシーバー得点)</Button>
                                                </div>
                                                {/* サービスエースはサーバー得点なので青(primary) */}
                                                <Button variant="primary" className="w-full h-12 mb-2 text-xs" onClick={() => finalizePoint('ACE', currentScore.currentServerSide, { servePlacement: selectedServePlacement, sForm1: serverFormation, rForm1: receiverFormation })}>サービスエース<br/>(サーバー得点)</Button>
                                                <Button variant="secondary" className="w-full h-12 font-bold text-slate-700 border-slate-400" onClick={() => { 
                                                    setPointData({...pointData, servePlacement: selectedServePlacement, sForm1: serverFormation, rForm1: receiverFormation}); 
                                                    setPointStep('RETURN'); 
                                                }}>リターンへ ➔</Button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Step 2: RETURN */}
                                {pointStep === 'RETURN' && (
                                    <div className="animate-in fade-in slide-in-from-right-2 duration-200">
                                        <div className="flex items-center gap-2 text-xs text-slate-500 bg-slate-200 p-2 rounded mb-2">
                                            <CornerDownRight size={14} /> サーブ: <span className="font-bold">{pointData.servePlacement}</span>
                                        </div>
                                        <div className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                            <span className="bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">2</span>リターンを選択
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            {RETURN_PLACEMENTS.map(pos => (
                                                <button key={pos} onClick={() => setSelectedReturnPlacement(pos)} className={`p-3 text-sm rounded border transition-colors ${pos === '真ん中' ? 'col-span-2' : ''} ${selectedReturnPlacement === pos ? 'bg-blue-600 text-white border-blue-600 shadow-md font-bold' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'}`}>
                                                    {pos}
                                                </button>
                                            ))}
                                        </div>

                                        <div className={`transition-all overflow-hidden ${selectedReturnPlacement ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <div className="text-xs text-blue-800 font-bold mb-2 text-center">このリターンの結果は？</div>
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    {/* サーバー得点は青(primary)、レシーバー得点は赤(danger) */}
                                                    <Button variant="primary" className="h-12 text-xs" onClick={() => finalizePoint('SERVER_P', currentScore.currentServerSide, { returnPlacement: selectedReturnPlacement, sForm2: serverFormation, rForm2: receiverFormation })}>リターンミス<br/>(サーバー得点)</Button>
                                                    <Button variant="danger" className="h-12 text-xs" onClick={() => finalizePoint('RECEIVER_P', currentScore.currentServerSide === 'A' ? 'B' : 'A', { returnPlacement: selectedReturnPlacement, sForm2: serverFormation, rForm2: receiverFormation })}>リターンエース<br/>(レシーバー得点)</Button>
                                                </div>
                                                <Button variant="secondary" className="w-full h-12 font-bold text-slate-700 border-slate-400" onClick={() => { 
                                                    setPointData({...pointData, returnPlacement: selectedReturnPlacement, sForm2: serverFormation, rForm2: receiverFormation}); 
                                                    setPointStep('THIRD_SHOT'); 
                                                }}>3球目へ ➔</Button>
                                            </div>
                                        </div>

                                        <Button variant="secondary" className="w-full mt-4 text-xs" onClick={() => setPointStep('SERVE')}>↩ サーブ選択に戻る</Button>
                                    </div>
                                )}

                                {/* Step 3: THIRD SHOT */}
                                {pointStep === 'THIRD_SHOT' && (
                                    <div className="animate-in fade-in slide-in-from-right-2 duration-200 flex flex-col h-full">
                                        <div className="flex items-center gap-2 text-xs text-slate-500 bg-slate-200 p-2 rounded mb-2">
                                            <CornerDownRight size={14} /> サーブ: {pointData.servePlacement} ➔ リターン: <span className="font-bold">{pointData.returnPlacement}</span>
                                        </div>
                                        <div className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                                            <span className="bg-blue-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">3</span>3球目の対応を選択
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            {THIRD_SHOTS.map(shot => {
                                                // 前衛は赤系、後衛は青系で色分け
                                                const isFront = shot.includes('前衛');
                                                const unselectedClass = isFront ? 'bg-red-50 text-red-800 border-red-200 hover:bg-red-100' : 'bg-blue-50 text-blue-800 border-blue-200 hover:bg-blue-100';
                                                const selectedClass = isFront ? 'bg-red-500 text-white border-red-600 shadow-md font-bold' : 'bg-blue-600 text-white border-blue-600 shadow-md font-bold';
                                                
                                                return (
                                                    <button key={shot} onClick={() => setSelectedThirdShot(shot)} className={`p-2 text-xs rounded border transition-colors ${selectedThirdShot === shot ? selectedClass : unselectedClass}`}>
                                                        {shot}
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        <div className={`transition-all overflow-hidden ${selectedThirdShot ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <div className="text-xs text-blue-800 font-bold mb-2 text-center">このショットの結果は？</div>
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    {/* サーバー得点は青(primary)、レシーバー得点は赤(danger) */}
                                                    <Button variant="primary" className="h-12 text-xs" onClick={() => finalizePoint('SERVER_P', currentScore.currentServerSide, { thirdShot: selectedThirdShot, sForm3: serverFormation, rForm3: receiverFormation })}>決まった / 相手ミス<br/>(サーバー得点)</Button>
                                                    <Button variant="danger" className="h-12 text-xs" onClick={() => finalizePoint('RECEIVER_P', currentScore.currentServerSide === 'A' ? 'B' : 'A', { thirdShot: selectedThirdShot, sForm3: serverFormation, rForm3: receiverFormation })}>ミスした<br/>(レシーバー得点)</Button>
                                                </div>
                                                <Button variant="secondary" className="w-full h-12 font-bold text-slate-700 border-slate-400" onClick={() => { 
                                                    setPointData({...pointData, thirdShot: selectedThirdShot, sForm3: serverFormation, rForm3: receiverFormation}); 
                                                    setPointStep('RALLY'); 
                                                }}>ラリーが継続した ➔</Button>
                                            </div>
                                        </div>

                                        <Button variant="secondary" className="w-full mt-auto text-xs" onClick={() => { setPointStep('RETURN'); setSelectedThirdShot(null); }}>↩ リターン選択に戻る</Button>
                                    </div>
                                )}

                                {/* Step 4: RALLY */}
                                {pointStep === 'RALLY' && (
                                    <div className="animate-in fade-in slide-in-from-right-2 duration-200">
                                        <div className="flex flex-col gap-1 text-xs text-slate-500 bg-slate-200 p-2 rounded mb-4">
                                            <div>S: {pointData.servePlacement}</div>
                                            <div>R: {pointData.returnPlacement}</div>
                                            <div>3rd: {pointData.thirdShot}</div>
                                        </div>
                                        <div className="text-center py-6 bg-yellow-50 rounded-xl border border-yellow-200 mb-6">
                                            <Activity size={32} className="mx-auto text-yellow-500 mb-2 animate-pulse" />
                                            <div className="font-bold text-yellow-800">ラリー継続中...</div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            {/* サーバー得点は青(primary)、レシーバー得点は赤(danger) */}
                                            <Button variant="primary" className="h-16" onClick={() => finalizePoint('SERVER_P', currentScore.currentServerSide, { sForm4: serverFormation, rForm4: receiverFormation })}>サーバー得点</Button>
                                            <Button variant="danger" className="h-16" onClick={() => finalizePoint('RECEIVER_P', currentScore.currentServerSide === 'A' ? 'B' : 'A', { sForm4: serverFormation, rForm4: receiverFormation })}>レシーバー得点</Button>
                                        </div>

                                        <Button variant="secondary" className="w-full mt-6 text-xs" onClick={() => setPointStep('THIRD_SHOT')}>↩ 3球目選択に戻る</Button>
                                    </div>
                                )}

                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
